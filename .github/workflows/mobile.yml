name: CI — ndn-mobile (cross-compile)

# Depends on ndn-rs + ndn-ext via ../ path deps → sibling checkout.

on:
  push:
    branches: [main]
    paths: ["crates/**", "examples/**", "Cargo.toml", ".github/workflows/mobile.yml"]
  pull_request:
    branches: [main]
    paths: ["crates/**", "examples/**", "Cargo.toml", ".github/workflows/mobile.yml"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  ios:
    name: iOS — aarch64-apple-ios
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: ndn-mobile }
      - uses: actions/checkout@v4
        with: { repository: "${{ github.repository_owner }}/ndn-rs", ref: main, path: ndn-rs }
      - uses: actions/checkout@v4
        with: { repository: "${{ github.repository_owner }}/ndn-ext", ref: main, path: ndn-ext }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: aarch64-apple-ios }
      - name: Check ndn-mobile (iOS)
        working-directory: ndn-mobile
        run: cargo check -p ndn-mobile --target aarch64-apple-ios

  android:
    name: Android — aarch64-linux-android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: ndn-mobile }
      - uses: actions/checkout@v4
        with: { repository: "${{ github.repository_owner }}/ndn-rs", ref: main, path: ndn-rs }
      - uses: actions/checkout@v4
        with: { repository: "${{ github.repository_owner }}/ndn-ext", ref: main, path: ndn-ext }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: aarch64-linux-android }
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked
      - name: Check ndn-mobile (Android)
        working-directory: ndn-mobile
        run: cargo ndk -t arm64-v8a check -p ndn-mobile
